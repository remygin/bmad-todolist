services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-todolist}
      POSTGRES_USER: ${POSTGRES_USER:-todolist}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-todolist}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-todolist} -d ${POSTGRES_DB:-todolist}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: ${DATABASE_URL:-jdbc:postgresql://db:5432/todolist}
      DATABASE_USERNAME: ${DATABASE_USERNAME:-todolist}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-todolist}
      JWT_SECRET: ${JWT_SECRET:-change-me-to-a-long-random-secret-key-at-least-256-bits-long}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-3600000}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    depends_on:
      - backend

volumes:
  pgdata:
