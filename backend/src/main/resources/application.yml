spring:
  application:
    name: todolist
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/todolist}
    username: ${DATABASE_USERNAME:todolist}
    password: ${DATABASE_PASSWORD:todolist}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
  jackson:
    deserialization:
      fail-on-missing-creator-properties: false
      fail-on-null-for-primitives: false

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

app:
  jwt:
    secret: ${JWT_SECRET:change-me-to-a-long-random-secret-key-at-least-256-bits}
    expiration-ms: ${JWT_EXPIRATION_MS:3600000}
  admin:
    username: ${ADMIN_USERNAME:admin}
    password: ${ADMIN_PASSWORD:admin123}

---
spring:
  config:
    activate:
      on-profile: test
  datasource:
    url: jdbc:h2:mem:todolist;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true

app:
  jwt:
    secret: test-jwt-secret-key-that-is-long-enough-for-hs256-algorithm
    expiration-ms: 3600000
  admin:
    username: admin
    password: admin123
